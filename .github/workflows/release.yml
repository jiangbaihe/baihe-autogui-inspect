name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: baihe-autogui-inspect

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          path: baihe-autogui-inspect

      - name: Check out baihe-autogui sibling repository
        uses: actions/checkout@v4
        with:
          repository: jiangbaihe/baihe-autogui
          ref: v0.1.12
          path: baihe-autogui

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Run tests
        run: uv run pytest -q

      - name: Run Ruff
        run: uv run ruff check .

      - name: Run mypy
        run: uv run mypy src tests

      - name: Build package
        run: uv build

      - name: Smoke test built wheel
        run: |
          $wheel = (Get-ChildItem dist\*.whl | Select-Object -First 1).FullName
          uv run --python 3.8 --no-project --with ..\baihe-autogui --with $wheel python scripts/smoke_import.py

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: baihe-autogui-inspect/dist/

  publish-pypi:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    environment:
      name: pypi
      url: https://pypi.org/project/baihe-autogui-inspect/

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
