name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: baihe-autogui-inspect

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          path: baihe-autogui-inspect

      - name: Check out baihe-autogui sibling repository
        uses: actions/checkout@v4
        with:
          repository: jiangbaihe/baihe-autogui
          ref: v0.1.11
          path: baihe-autogui

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Run tests
        run: uv run pytest -q

      - name: Run Ruff
        run: uv run ruff check .

      - name: Run mypy
        run: uv run mypy src tests

      - name: Build package
        run: uv build

      - name: Smoke test built wheel
        run: |
          $wheel = (Get-ChildItem dist\*.whl | Select-Object -First 1).FullName
          uv run --python 3.8 --no-project --with $wheel python scripts/smoke_import.py
